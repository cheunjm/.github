name: CI Autofix

on:
  workflow_call:
    inputs:
      format_fix_command:
        description: "Command to auto-fix formatting (e.g., npx prettier --write '**/*.{ts,tsx,md,json}')"
        type: string
        required: false
        default: ""
      lint_fix_command:
        description: "Command to auto-fix lint (e.g., npx eslint --fix .)"
        type: string
        required: false
        default: ""
      node_version:
        description: "Node.js version (used when python_version is not set)"
        type: string
        required: false
        default: "20"
      python_version:
        description: "Python version — if set, sets up Python instead of Node"
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CLAUDE_ARAMI_APP_ID:
        required: true
      CLAUDE_ARAMI_PRIVATE_KEY:
        required: true

jobs:
  resolve-pr:
    name: Resolve PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      head_branch: ${{ steps.pr.outputs.head_branch }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      has_pr: ${{ steps.pr.outputs.has_pr }}
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "head_branch=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR_JSON" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"

  script-fix:
    name: Script Fix (format/lint)
    runs-on: ubuntu-latest
    needs: resolve-pr
    if: >
      needs.resolve-pr.outputs.has_pr == 'true' &&
      (inputs.format_fix_command != '' || inputs.lint_fix_command != '')
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Skip if last commit was from bot
        id: skip-check
        run: |
          last_author=$(git log -1 --pretty=format:'%ae')
          if echo "$last_author" | grep -qiE 'aramiworks|claude|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version == ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install Node dependencies
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version == ''
        run: npm ci

      - name: Setup Python
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python dependencies
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version != ''
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff || true

      - name: Run format fix
        if: steps.skip-check.outputs.skip != 'true' && inputs.format_fix_command != ''
        run: ${{ inputs.format_fix_command }}
        continue-on-error: true

      - name: Run lint fix
        if: steps.skip-check.outputs.skip != 'true' && inputs.lint_fix_command != ''
        run: ${{ inputs.lint_fix_command }}
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "claude-arami[bot]"
          git config user.email "claude-arami[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting/lint changes needed"
            exit 0
          fi
          git commit -m "style: auto-fix format/lint

          Co-Authored-By: claude-arami[bot] <claude-arami[bot]@users.noreply.github.com>"
          git push origin ${{ needs.resolve-pr.outputs.head_branch }}

  claude-fix:
    name: Claude Fix (test/typecheck/build/codecov)
    runs-on: ubuntu-latest
    needs: [resolve-pr, script-fix]
    if: >
      always() &&
      needs.resolve-pr.outputs.has_pr == 'true' &&
      needs.resolve-pr.result == 'success'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Check for ci-autofix label
        id: label-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ needs.resolve-pr.outputs.pr_number }}/labels --jq '.[].name')
          if echo "$LABELS" | grep -q "ci-autofix"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get failed jobs
        if: steps.label-check.outputs.skip != 'true'
        id: failures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(",")')

          CODECOV_STATE=$(gh api repos/${{ github.repository }}/commits/${{ needs.resolve-pr.outputs.head_sha }}/status \
            --jq '[.statuses[] | select(.context == "codecov/patch")] | .[0].state // "none"')

          CLAUDE_FAILURES=""
          if echo "$FAILED_JOBS" | grep -qi "test"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}test,"; fi
          if echo "$FAILED_JOBS" | grep -qi "typecheck"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}typecheck,"; fi
          if echo "$FAILED_JOBS" | grep -qi "build"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}build,"; fi
          if [ "$CODECOV_STATE" = "failure" ]; then CLAUDE_FAILURES="${CLAUDE_FAILURES}codecov,"; fi

          CLAUDE_FAILURES=$(echo "$CLAUDE_FAILURES" | sed 's/,$//')
          echo "failed_jobs=$FAILED_JOBS" >> "$GITHUB_OUTPUT"
          echo "claude_failures=$CLAUDE_FAILURES" >> "$GITHUB_OUTPUT"
          echo "has_claude_failures=$( [ -n "$CLAUDE_FAILURES" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Skip if last commit was from bot
        if: steps.label-check.outputs.skip != 'true' && steps.failures.outputs.has_claude_failures == 'true'
        id: skip-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AUTHOR=$(gh api repos/${{ github.repository }}/commits/${{ needs.resolve-pr.outputs.head_sha }} --jq '.author.login // ""')
          if echo "$AUTHOR" | grep -qiE 'claude-arami|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_branch }}
          fetch-depth: 0

      - name: Generate GitHub App token
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Run Claude Code
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: '--allowedTools "mcp__github,Edit,Read,Glob,Grep,Bash(npm test:*),Bash(npx:*),Bash(gh api:*),Bash(gh run view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"'
          prompt: |
            The following CI checks failed on PR #${{ needs.resolve-pr.outputs.pr_number }} in ${{ github.repository }}:
            **Failed checks:** ${{ steps.failures.outputs.claude_failures }}
            **CI run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}

            Your job:
            1. For each failed check, read the CI logs using:
               `gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed`
            2. Read the relevant source code and test files to understand the context.
            3. Diagnose the root cause of each failure.
            4. Fix the code:
               - **test failure** → fix the failing test or the code it tests
               - **typecheck failure** → fix TypeScript/type errors
               - **build failure** → fix build errors
               - **codecov failure** → add unit tests to bring patch coverage above 80%
            5. Commit and push your fixes to the `${{ needs.resolve-pr.outputs.head_branch }}` branch.

            Rules:
            - Use descriptive commit messages: `fix: ...` or `test: ...`
            - Do not modify files unrelated to the failures.
            - If a failure is pre-existing (also fails on main), skip it and post a PR comment explaining why.
            - Keep changes minimal and focused.
            - Do NOT fix formatting or lint issues — those are handled by the script tier.

      - name: Add ci-autofix label
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ needs.resolve-pr.outputs.pr_number }}/labels \
            -f "labels[]=ci-autofix" || true
