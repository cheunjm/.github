name: CI Autofix

on:
  workflow_call:
    inputs:
      format_fix_command:
        description: "Command to auto-fix formatting (e.g., npx prettier --write '**/*.{ts,tsx,md,json}')"
        type: string
        required: false
        default: ""
      lint_fix_command:
        description: "Command to auto-fix lint (e.g., npx eslint --fix .)"
        type: string
        required: false
        default: ""
      node_version:
        description: "Node.js version (used when python_version is not set)"
        type: string
        required: false
        default: "20"
      python_version:
        description: "Python version — if set, sets up Python instead of Node"
        type: string
        required: false
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      CLAUDE_ARAMI_APP_ID:
        required: true
      CLAUDE_ARAMI_PRIVATE_KEY:
        required: true
      PKG_READ_TOKEN:
        required: false
        description: "PAT with read:packages on @aramiworks for npm install. Falls back to App token if unset."

jobs:
  resolve-pr:
    name: Resolve PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      (github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success')
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      head_branch: ${{ steps.pr.outputs.head_branch }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      has_pr: ${{ steps.pr.outputs.has_pr }}
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls --jq '.[0]')
          if [ -z "$PR_JSON" ] || [ "$PR_JSON" = "null" ]; then
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_pr=true" >> "$GITHUB_OUTPUT"
          echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
          echo "head_branch=$(echo "$PR_JSON" | jq -r '.head.ref')" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(echo "$PR_JSON" | jq -r '.head.sha')" >> "$GITHUB_OUTPUT"

  script-fix:
    name: Script Fix (format/lint)
    runs-on: ubuntu-latest
    needs: resolve-pr
    if: >
      needs.resolve-pr.outputs.has_pr == 'true' &&
      github.event.workflow_run.name == 'CI' &&
      (inputs.format_fix_command != '' || inputs.lint_fix_command != '')
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}
          owner: aramiworks

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Skip if last commit was from bot
        id: skip-check
        run: |
          last_author=$(git log -1 --pretty=format:'%ae')
          if echo "$last_author" | grep -qiE 'aramiworks|claude|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version == ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          registry-url: https://npm.pkg.github.com
          scope: '@aramiworks'

      - name: Install Node dependencies
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version == ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_READ_TOKEN || steps.app-token.outputs.token }}
        run: npm ci

      - name: Setup Python
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python dependencies
        if: steps.skip-check.outputs.skip != 'true' && inputs.python_version != ''
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff || true

      - name: Run format fix
        if: steps.skip-check.outputs.skip != 'true' && inputs.format_fix_command != ''
        run: ${{ inputs.format_fix_command }}
        continue-on-error: true

      - name: Run lint fix
        if: steps.skip-check.outputs.skip != 'true' && inputs.lint_fix_command != ''
        run: ${{ inputs.lint_fix_command }}
        continue-on-error: true

      - name: Commit and push if changed
        if: steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "claude-arami[bot]"
          git config user.email "claude-arami[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No formatting/lint changes needed"
            exit 0
          fi
          git commit -m "style: auto-fix format/lint

          Co-Authored-By: claude-arami[bot] <claude-arami[bot]@users.noreply.github.com>"
          git push origin ${{ needs.resolve-pr.outputs.head_branch }}

  claude-fix:
    name: Claude Fix (test/typecheck/build/codecov)
    runs-on: ubuntu-latest
    needs: [resolve-pr, script-fix]
    if: >
      always() &&
      needs.resolve-pr.outputs.has_pr == 'true' &&
      needs.resolve-pr.result == 'success' &&
      github.event.workflow_run.name == 'CI'
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Check for ci-autofix label
        id: label-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api repos/${{ github.repository }}/issues/${{ needs.resolve-pr.outputs.pr_number }}/labels --jq '.[].name')
          if echo "$LABELS" | grep -q "ci-autofix"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Get failed jobs
        if: steps.label-check.outputs.skip != 'true'
        id: failures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(",")')

          CODECOV_STATE=$(gh api repos/${{ github.repository }}/commits/${{ needs.resolve-pr.outputs.head_sha }}/status \
            --jq '[.statuses[] | select(.context == "codecov/patch")] | .[0].state // "none"')

          CLAUDE_FAILURES=""
          if echo "$FAILED_JOBS" | grep -qi "test"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}test,"; fi
          if echo "$FAILED_JOBS" | grep -qi "typecheck"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}typecheck,"; fi
          if echo "$FAILED_JOBS" | grep -qi "build"; then CLAUDE_FAILURES="${CLAUDE_FAILURES}build,"; fi
          if [ "$CODECOV_STATE" = "failure" ]; then CLAUDE_FAILURES="${CLAUDE_FAILURES}codecov,"; fi

          CLAUDE_FAILURES=$(echo "$CLAUDE_FAILURES" | sed 's/,$//')
          echo "failed_jobs=$FAILED_JOBS" >> "$GITHUB_OUTPUT"
          echo "claude_failures=$CLAUDE_FAILURES" >> "$GITHUB_OUTPUT"
          echo "has_claude_failures=$( [ -n "$CLAUDE_FAILURES" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Skip if last commit was from bot
        if: steps.label-check.outputs.skip != 'true' && steps.failures.outputs.has_claude_failures == 'true'
        id: skip-check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AUTHOR=$(gh api repos/${{ github.repository }}/commits/${{ needs.resolve-pr.outputs.head_sha }} --jq '.author.login // ""')
          if echo "$AUTHOR" | grep -qiE 'claude-arami|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_branch }}
          fetch-depth: 0

      - name: Generate GitHub App token
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}

      - name: Run Claude Code
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: '--allowedTools "mcp__github,Edit,Read,Glob,Grep,Bash(npm test:*),Bash(npx:*),Bash(gh api:*),Bash(gh run view:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"'
          prompt: |
            The following CI checks failed on PR #${{ needs.resolve-pr.outputs.pr_number }} in ${{ github.repository }}:
            **Failed checks:** ${{ steps.failures.outputs.claude_failures }}
            **CI run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}

            Your job:
            1. For each failed check, read the CI logs using:
               `gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed`
            2. Read the relevant source code and test files to understand the context.
            3. Diagnose the root cause of each failure.
            4. Fix the code:
               - **test failure** → fix the failing test or the code it tests
               - **typecheck failure** → fix TypeScript/type errors
               - **build failure** → fix build errors
               - **codecov failure** → add unit tests to bring patch coverage above 80%
            5. Commit and push your fixes to the `${{ needs.resolve-pr.outputs.head_branch }}` branch.

            Rules:
            - Use descriptive commit messages: `fix: ...` or `test: ...`
            - Do not modify files unrelated to the failures.
            - If a failure is pre-existing (also fails on main), skip it and post a PR comment explaining why.
            - Keep changes minimal and focused.
            - Do NOT fix formatting or lint issues — those are handled by the script tier.

      - name: Add ci-autofix label
        if: >
          steps.label-check.outputs.skip != 'true' &&
          steps.failures.outputs.has_claude_failures == 'true' &&
          steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ needs.resolve-pr.outputs.pr_number }}/labels \
            -f "labels[]=ci-autofix" || true

  changeset-fix:
    name: Changeset Fix (auto-add missing changeset)
    runs-on: ubuntu-latest
    needs: resolve-pr
    if: >
      needs.resolve-pr.outputs.has_pr == 'true' &&
      github.event.workflow_run.name == 'changeset' &&
      github.event.workflow_run.conclusion == 'failure'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CLAUDE_ARAMI_APP_ID }}
          private-key: ${{ secrets.CLAUDE_ARAMI_PRIVATE_KEY }}
          owner: aramiworks

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_branch }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Skip if no changeset config or branch is changeset-release
        id: precheck
        run: |
          if [ ! -f .changeset/config.json ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=no .changeset/config.json" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ needs.resolve-pr.outputs.head_branch }}" == changeset-release/* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=changeset-release branch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Skip if last commit was from bot
        if: steps.precheck.outputs.skip != 'true'
        id: skip-check
        run: |
          last_author=$(git log -1 --pretty=format:'%ae')
          if echo "$last_author" | grep -qiE 'aramiworks|claude|github-actions'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch base branch
        if: steps.precheck.outputs.skip != 'true' && steps.skip-check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BASE_REF=$(gh api repos/${{ github.repository }}/pulls/${{ needs.resolve-pr.outputs.pr_number }} --jq '.base.ref')
          echo "BASE_REF=$BASE_REF" >> "$GITHUB_ENV"
          git fetch origin "$BASE_REF" --depth=1

      - name: Generate changeset
        if: steps.precheck.outputs.skip != 'true' && steps.skip-check.outputs.skip != 'true'
        id: gen
        env:
          BRANCH: ${{ needs.resolve-pr.outputs.head_branch }}
        run: |
          node <<'EOF'
          const { execSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          const sh = (cmd) => execSync(cmd, { encoding: 'utf8' }).trim();

          const baseRef = process.env.BASE_REF;
          const branch = process.env.BRANCH;

          // 1. Get changed files (excluding .github and .changeset)
          const changed = sh(`git diff origin/${baseRef}...HEAD --name-only --diff-filter=ACMR`)
            .split('\n')
            .filter(Boolean)
            .filter((f) => !f.startsWith('.github/') && !f.startsWith('.changeset/'));

          if (changed.length === 0) {
            console.log('No non-CI files changed; skipping.');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'created=false\nreason=no-files\n');
            process.exit(0);
          }

          // 2. Resolve each file to its nearest workspace package.json (apps/* or packages/*)
          const wsRoots = new Set();
          for (const f of changed) {
            const parts = f.split('/');
            // Match apps/<name>/... or packages/<name>/... (single level under apps/packages)
            // For monorepos with apps/subgraphs/<name>, walk to nearest package.json.
            let dir = path.dirname(f);
            while (dir && dir !== '.' && dir !== '/') {
              const pj = path.join(dir, 'package.json');
              if (fs.existsSync(pj)) {
                if (/^(apps|packages)\//.test(dir)) {
                  wsRoots.add(dir);
                  break;
                }
              }
              dir = path.dirname(dir);
            }
          }

          if (wsRoots.size === 0) {
            console.log('No workspace packages touched; skipping.');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'created=false\nreason=no-workspace\n');
            process.exit(0);
          }

          const packages = [...wsRoots].map((d) => {
            const pkg = JSON.parse(fs.readFileSync(path.join(d, 'package.json'), 'utf8'));
            return pkg.name;
          }).filter(Boolean);

          if (packages.length === 0) {
            console.log('Workspace dirs found but no package names; skipping.');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'created=false\nreason=no-names\n');
            process.exit(0);
          }

          // 3. Determine bump type from latest commit subject
          const subject = sh(`git log -1 --pretty=%s`);
          const body = sh(`git log -1 --pretty=%B`);
          let bump = 'patch';
          if (/^[a-z]+(\(.*\))?!:/.test(subject) || /BREAKING CHANGE/.test(body)) {
            bump = 'major';
          } else if (/^feat(\(.*\))?:/.test(subject)) {
            bump = 'minor';
          }

          // 4. Build slug from branch name
          const slug = branch.replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-|-$/g, '').toLowerCase().slice(0, 50);
          const file = `.changeset/auto-${slug}.md`;

          // 5. Write changeset
          const lines = [
            '---',
            ...packages.map((p) => `"${p}": ${bump}`),
            '---',
            '',
            subject,
            '',
          ];
          fs.mkdirSync('.changeset', { recursive: true });
          fs.writeFileSync(file, lines.join('\n'));

          console.log(`Wrote ${file}:`);
          console.log(lines.join('\n'));

          fs.appendFileSync(
            process.env.GITHUB_OUTPUT,
            `created=true\nfile=${file}\npackages=${packages.join(',')}\nbump=${bump}\n`,
          );
          EOF

      - name: Commit and push
        if: steps.precheck.outputs.skip != 'true' && steps.skip-check.outputs.skip != 'true' && steps.gen.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "claude-arami[bot]"
          git config user.email "claude-arami[bot]@users.noreply.github.com"
          git add "${{ steps.gen.outputs.file }}"
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "chore: auto-add changeset

          Packages: ${{ steps.gen.outputs.packages }}
          Bump: ${{ steps.gen.outputs.bump }}

          Co-Authored-By: claude-arami[bot] <claude-arami[bot]@users.noreply.github.com>"
          git push origin "${{ needs.resolve-pr.outputs.head_branch }}"
